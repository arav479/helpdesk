<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | SSN Helpdesk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body class="dashboard-body {{ theme }}-theme">
    <aside class="sidebar">
        <div class="logo"><div class="logo-box"></div>SSN Helpdesk</div>
        <nav>
            <ul class="nav-links">
                <a href="/dashboard" class="nav-link">Open New Ticket</a>
                <a href="/viewmytickets" class="nav-link">My Tickets</a>
                <a href="/knowledge-base" class="nav-link">Knowledge Base</a>
                <a href="/support" class="nav-link">Support</a>
                <a href="/settings" class="nav-link active">Settings</a>
                <a href="/logout" class="nav-link" style="color: #ef4444; margin-top: auto;">Logout</a>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1>Settings</h1>
                <p style="color: var(--text-muted); margin-top: 4px;">Your helpdesk preferences.</p>
            </div>
            <div class="admin-profile"><div style="font-weight: 600;">{{ Email }}</div><div class="avatar">SU</div></div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><div class="label">My Tickets</div><div class="value">{{ ticket_count }}</div></div>
            <div class="stat-card"><div class="label">Open Tickets</div><div class="value">{{ open_tickets }}</div></div>
            <div class="stat-card"><div class="label">Completed Tickets</div><div class="value">{{ completed_tickets }}</div></div>
        </div>

        <div class="tickets-container" style="padding: 1.5rem;">
            <h2 style="margin-bottom: 1rem;">Theme</h2>
            <form action="/toggle-theme" method="POST">
                <button type="submit" class="btn-primary">Switch to {{ 'Light' if theme == 'dark' else 'Dark' }} Theme</button>
            </form>
        </div>
    </main>
</body>

</html>
