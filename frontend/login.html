<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SSN Helpdesk</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>
    <header>
        <div class="top-banner">
            <div class="banner_left">
                <h2>SSN Helpdesk</h2>
            </div>

        </div>

    </header>

    <div class="nav">
        <a href="/support" class="nav-link"><span>support centre</span></a>
        <span>open new ticket</span>
        <span class="active">User / Admin Login</span>
        <a href="/engineer_login" class="nav-link"><span>🔧 Engineer Login</span></a>
    </div>

    <div class="header-text">
           <h2>Sign in to SSN-SNU Chennai Helpdesk</h2>
    </div>

    <div class="login-section">
        <div class="login-box">
            {% if error %}
            <div style="background-color: #fef2f2; color: #ef4444; border: 1px solid #fecaca; padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; font-family: sans-serif;">
                {{ error }}
            </div>
            {% endif %}
            {% if success %}
            <div style="background-color: #f0fdf4; color: #22c55e; border: 1px solid #bbf7d0; padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; font-family: sans-serif;">
                {{ success }}
            </div>
            {% endif %}
            <form action="/create" method="POST">
                <input type="text" placeholder="Email address" name="email" required>
                <input type="password" placeholder="Password" name="password" required>
                <select name="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit" name="signin" value="signin">SIGN IN</button>
                <p>If already have a account </p>
                <button type="submit" name="login" value="login">LOGIN</button>
            </form>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0; text-align: center;">
                <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 10px;">Are you a support engineer?</p>
                <a href="/engineer_login" style="display: inline-block; padding: 12px 30px; background: linear-gradient(135deg, #4F46E5, #7C3AED); color: white; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 0.9rem; transition: 0.3s;">🔧 Engineer Login Portal</a>
            </div>
        </div>
    </div>

</body>

</html>
