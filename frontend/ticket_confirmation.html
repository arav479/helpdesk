<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Confirmation | SSN Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        .confirmation-card {
            background: white;
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            margin: 4rem auto;
            border: 1px solid var(--border-color);
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body style="background-color: var(--bg-main); font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
    <div class="confirmation-card">
        <div class="success-icon">✅</div>
        <h1 style="color: var(--text-main); margin-bottom: 1rem;">Ticket Created Successfully</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Your issue has been recorded and an engineer will be assigned shortly.</p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="/viewmytickets" class="btn-primary" style="text-decoration: none;">View My Tickets</a>
            <a href="/dashboard" class="btn-outline" style="text-decoration: none;">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
