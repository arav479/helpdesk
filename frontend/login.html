<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SSN Helpdesk</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>
    <header>
        <div class="top-banner">
            <div class="banner_left">
                <h2>SSN Helpdesk</h2>
            </div>

        </div>

    </header>

    <div class="nav">
        <a href="/support" class="nav-link"><span>support centre</span></a>
        <span>open new ticket</span>
        <span class="active">Ticket</span>
    </div>

    <div class="header-text">
        <h2>Sign in to SSN-SNU Chennai Helpdesk</h2>
    </div>

    <div class="login-section">
        <div class="login-box">
            {% if error %}
            <div style="background-color: #fef2f2; color: #ef4444; border: 1px solid #fecaca; padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; font-family: sans-serif;">
                {{ error }}
            </div>
            {% endif %}
            {% if success %}
            <div style="background-color: #f0fdf4; color: #22c55e; border: 1px solid #bbf7d0; padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; font-family: sans-serif;">
                {{ success }}
            </div>
            {% endif %}
            <form action="/create" method="POST">
                <input type="email" placeholder="Email / username" name="email" required>
                <input type="password" placeholder="Password" name="password" required>
                <select name="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit" name="signin" value="signin">SIGN IN</button>
                <p>If already have a account </p>
                <button type="submit" name="login" value="login">LOGIN</button>
            </form>
        </div>
    </div>

</body>

</html>
